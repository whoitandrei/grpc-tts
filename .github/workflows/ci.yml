name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker:
    name: Docker build (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: api_service
            dockerfile: api_service/Dockerfile
            image: api-service
          - name: tts-service
            dockerfile: tts-service/Dockerfile
            image: tts-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: false
          tags: local/${{ matrix.component.image }}:ci

  build-qt-client:
    name: Build Qt client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qt6-base-dev qt6-multimedia-dev

      - name: Configure Qt client
        run: cmake -S qt_client -B qt_client/build -G Ninja

      - name: Build Qt client
        run: cmake --build qt_client/build
  
  test-api-service:
    name: Test API service
    needs: build-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            api_service/requirements.txt
            requirements-dev.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api_service/requirements.txt -r requirements-dev.txt
      
      - name: Run API service tests
        run: pytest tests/api_service -q

  tests-tts-service:
    name: Test TTS service
    needs: build-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            tts-service/requirements.txt
            requirements-dev.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tts-service/requirements.txt -r requirements-dev.txt
      
      - name: Run TTS service tests
        run: pytest tests/tts_service -q