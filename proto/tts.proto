syntax = "proto3";

package tts.v1;

service TTSService {
  rpc SynthesizeVoice(SynthesizeRequest) returns (SynthesizeResponse);
}

message SynthesizeRequest {
  string text = 1;
  string voice = 2;
  string language = 3;
  string environment = 4;
  string request_id = 5;
}

message SynthesizeResponse {
  bytes audio = 1;
  string filename = 2;
  string content_type = 3;
  string request_id = 5;
}
